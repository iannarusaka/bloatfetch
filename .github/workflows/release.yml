name: release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --release
      - run: Compress-Archive -Path target/release/bloatfetch.exe -DestinationPath bloatfetch-x86_64-windows.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: bloatfetch-x86_64-windows.zip
